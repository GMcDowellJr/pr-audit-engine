repo_intent_marker: INFERRED
repo_intent: |
  This repository (owner/test-repo) is a sample project used to validate the
  pr-audit-engine pipeline. It does not implement production business logic.
  Correctness means that the pipeline scripts fetch, normalize, and extract
  structured rider YAML without data loss or silent failures. The repo
  explicitly does not provide a UI, a hosted service, or any end-user product.

invariants_marker: INFERRED
invariants:
  - All pipeline scripts must exit with a non-zero code when a required input
    file is absent.
  - The consolidated.json file on disk must never be modified by
    pass1_extract_llm — compressed content is held in memory only.
  - A rider-draft.yaml must always be validated with rider_validate.py before
    being consumed by downstream tooling.
  - pass1_extract_llm shall not call the Anthropic API when --dry-run is set.

failure_mode_categories_marker: INFERRED
failure_mode_categories:
  - name: Silent Pipeline Failure
    description: >
      A script exits 0 but produces no output file or an empty output file,
      causing downstream scripts to silently operate on stale or missing data.
    example: >
      pass1_extract_llm writes an empty rider-draft.yaml when the LLM returns
      a non-mapping response without checking the parsed value.
  - name: Schema Drift
    description: >
      A change adds or renames a marker key without updating validate_draft_shape,
      causing the shape validator to miss missing keys in LLM output.
    example: >
      A new top-level field is added to the rider schema but not appended to
      EXPECTED_KEYS in validate_draft_shape, so missing fields pass undetected.
  - name: Uncontrolled Token Expansion
    description: >
      Large uncompressed files are injected into the extraction prompt, causing
      the request to exceed the model's context limit or incur unexpected cost.
    example: >
      A docs/architecture.md file at 80 KB is classified as summary but
      MIN_COMPRESSION_BYTES is set too high, so it is injected verbatim.

attention_anchors_marker: INFERRED
attention_anchors:
  file_anchors:
    - path: skills/pr-audit-engine/pass1_extract_llm.py
      reason: >
        Core LLM extraction logic — changes here affect prompt assembly,
        compression, and rider output for every repository processed.
    - path: skills/pr-audit-engine/rider_validate.py
      reason: >
        Downstream validator consumed after extraction — schema changes here
        must stay in sync with the system prompt schema in pass1_extract_llm.
  pattern_anchors:
    - pattern: "sys\\.exit\\(0\\)"
      reason: >
        Every early-exit path must be intentional; a premature exit(0) can
        mask failures and leave output files absent or stale.

context_docs_marker: INFERRED
context_docs:
